# Auto-generated by NativeFlow Studio. Do not edit by hand.
workflows:
  android-apk:
    name: Android APK
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci || npm install
      - name: Expo prebuild
        script: npx expo prebuild --platform android --clean
      - name: Gradle assemble
        script: |
          cd android
          # Honor BUILD_VARIANT injected by the orchestrator: 'debug' -> assembleDebug,
          # anything else (including unset) -> assembleRelease. Preview APK builds
          # send 'debug' so they produce a debuggable, unsigned APK; release builds
          # send 'release'.
          VARIANT_RAW="${BUILD_VARIANT:-release}"
          case "$VARIANT_RAW" in
            debug|Debug|DEBUG) GRADLE_TASK="assembleDebug" ;;
            *) GRADLE_TASK="assembleRelease" ;;
          esac
          # For debug builds, strip any release-signing env so a missing keystore
          # cannot mask the real failure with a "keystore not found" error.
          if [ "$GRADLE_TASK" = "assembleDebug" ]; then
            unset NATIVEFLOW_UPLOAD_STORE_FILE NATIVEFLOW_UPLOAD_STORE_PASSWORD \
                  NATIVEFLOW_UPLOAD_KEY_ALIAS NATIVEFLOW_UPLOAD_KEY_PASSWORD
          fi
          # Give Gradle enough heap to compile RN + Kotlin on the free tier and
          # always emit --stacktrace/--info so the failure block is diagnosable.
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
          echo "Running ./gradlew $GRADLE_TASK (BUILD_VARIANT=$VARIANT_RAW)"
          ./gradlew "$GRADLE_TASK" --stacktrace --info --no-daemon
    artifacts:
      - android/app/build/outputs/**/*.apk

  android-aab:
    name: Android AAB
    max_build_duration: 60
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci || npm install
      - name: Expo prebuild
        script: npx expo prebuild --platform android --clean
      - name: Gradle bundle
        script: |
          cd android
          export GRADLE_OPTS="-Dorg.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8"
          ./gradlew bundleRelease --stacktrace --info --no-daemon
    artifacts:
      - android/app/build/outputs/**/*.aab

  ios-ipa:
    name: iOS IPA
    instance_type: mac_mini_m2
    max_build_duration: 90
    integrations:
      app_store_connect: default
    environment:
      node: 20
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install dependencies
        script: npm ci || npm install
      - name: Expo prebuild
        script: npx expo prebuild --platform ios --clean
      - name: Pod install
        script: |
          cd ios
          pod install
      - name: Xcode archive
        script: |
          cd ios
          xcodebuild -workspace *.xcworkspace -scheme "$XCODE_SCHEME" \
            -sdk iphoneos -configuration Release \
            -archivePath build/App.xcarchive archive \
            CODE_SIGN_STYLE=Manual || \
          xcodebuild -workspace *.xcworkspace -scheme "$XCODE_SCHEME" \
            -sdk iphoneos -configuration Release \
            -archivePath build/App.xcarchive archive
      - name: Export IPA
        script: |
          cd ios
          xcodebuild -exportArchive -archivePath build/App.xcarchive \
            -exportPath build/ipa -exportOptionsPlist ExportOptions.plist || true
    artifacts:
      - ios/build/ipa/*.ipa
      - ios/build/App.xcarchive
